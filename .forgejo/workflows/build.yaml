name: Java Build & Release

on: push

jobs:
  build:
    runs-on: docker

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        run: |
          apt update -qq && apt install -qq -y maven
          mvn --batch-mode --update-snapshots clean package 

      - name: Set up docker
        run: |
          apt update -qq
          apt install -qq -y docker.io

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/datatactics/rahla
            #dttctcs/rahla problem with dockerhub
          tags: |
            type=raw,latest
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,prefix=
                
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Dockerhub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v1
        with:          
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASS }}          
      
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  trivy-scan:
    name: Trivy SBOM -> Dependency Track
    runs-on: docker
    needs: build
    # only on a release tag (release:prepare runs locally and pushes a vX.Y.Z tag)
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Set version & filename
        id: set-filename
        env:
          REF_NAME: ${{ github.ref_name }}          # reliable in Forgejo (FORGEJO_REF_NAME may be unset)
        run: |
          VERSION="${REF_NAME#v}"                    # v1.3.3 -> 1.3.3 (matches the docker semver tag)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "filename=sbom_rahla_${VERSION}.json" >> $GITHUB_OUTPUT

      # Trivy scan + Dependency-Track upload live in the shared actions repo
      # (https://codeberg.org/datatactics/forgejo-actions) so the ~20 consuming
      # repos don't each carry a copy of this script.
      - name: Trivy SBOM (CycloneDX) of the released image
        id: sbom
        uses: https://codeberg.org/datatactics/forgejo-actions/trivy-sbom@main
        with:
          image: docker.io/datatactics/rahla:${{ steps.set-filename.outputs.version }}
          output: ${{ steps.set-filename.outputs.filename }}
        env:
          TRIVY_USERNAME: ${{ vars.DOCKERHUB_USER }}
          TRIVY_PASSWORD: ${{ secrets.DOCKERHUB_PASS }}

      - name: Upload SBOM to Dependency Track
        uses: https://codeberg.org/datatactics/forgejo-actions/dtrack-upload@main
        with:
          bom: ${{ steps.sbom.outputs.sbom-file }}
          project-name: datatactics/rahla
          project-version: ${{ steps.set-filename.outputs.version }}
          parent-uuid: cff07b40-c95c-47e9-9367-cb9e8df75dcd   # rahla parent project in Dependency Track
        env:
          DTRACK_URL: ${{ vars.DTRACK_URL }}
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
