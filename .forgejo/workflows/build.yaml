name: Java Build & Release

on: push

jobs:
  build:
    runs-on: docker

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        run: |
          apt update -qq && apt install -qq -y maven
          mvn --batch-mode --update-snapshots clean package 

      - name: Set up docker
        run: |
          apt update -qq
          apt install -qq -y docker.io

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/datatactics/rahla
            #dttctcs/rahla problem with dockerhub
          tags: |
            type=raw,latest
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,prefix=
                
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Dockerhub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v1
        with:          
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASS }}          
      
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  trivy-scan:
    name: Trivy SBOM -> Dependency Track
    runs-on: docker
    needs: build
    # only on a release tag (release:prepare runs locally and pushes a vX.Y.Z tag)
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Set version & filename
        id: set-filename
        env:
          REF_NAME: ${{ github.ref_name }}          # reliable in Forgejo (FORGEJO_REF_NAME may be unset)
        run: |
          VERSION="${REF_NAME#v}"                    # v1.3.3 -> 1.3.3 (matches the docker semver tag)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "filename=sbom_rahla_${VERSION}.json" >> $GITHUB_OUTPUT

      - name: Install Trivy + jq
        run: |
          apt-get update -qq
          apt-get install -qq -y curl jq
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/v0.58.1/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Trivy SBOM (CycloneDX) of the released image
        env:
          TRIVY_FORMAT: "cyclonedx"
          TRIVY_OUTPUT: "${{ steps.set-filename.outputs.filename }}"
          TRIVY_SCANNERS: "vuln"
          TRIVY_SEVERITY: "MEDIUM,HIGH,CRITICAL"
          TRIVY_USERNAME: ${{ vars.DOCKERHUB_USER }}
          TRIVY_PASSWORD: ${{ secrets.DOCKERHUB_PASS }}
        run: trivy image docker.io/datatactics/rahla:${{ steps.set-filename.outputs.version }}

      - name: Strip licenses (Dependency-Track dislikes Trivy's license format)
        env:
          SBOM_FILE: "${{ steps.set-filename.outputs.filename }}"
        run: |
          jq '.components |= map(del(.licenses)) | del(.metadata.component.licenses)' "${SBOM_FILE}" > "${SBOM_FILE}.tmp"
          mv "${SBOM_FILE}.tmp" "${SBOM_FILE}"

      - name: Verify SBOM is non-empty
        # Guard against silently uploading an empty BOM: a transient Trivy/DB/registry
        # hiccup can yield a 0-component SBOM that Dependency-Track ingests as an empty
        # project (autoCreate makes the shell, but lastBomImport stays null). Fail loud.
        env:
          SBOM_FILE: "${{ steps.set-filename.outputs.filename }}"
        run: |
          count=$(jq '.components | length' "${SBOM_FILE}")
          echo "SBOM component count: ${count}"
          if [ "${count}" -lt 1 ]; then
            echo "::error::Trivy produced an SBOM with 0 components — refusing to upload an empty BOM."
            exit 1
          fi

      - name: Upload SBOM to Dependency Track
        env:
          DTRACK_URL: ${{ vars.DTRACK_URL }}
          PARENTUUID: "cff07b40-c95c-47e9-9367-cb9e8df75dcd"   # rahla parent project in Dependency Track
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
        # curl sets the multipart Content-Type (incl. boundary) itself for -F uploads;
        # do not override it. --fail-with-body turns an HTTP error into a non-zero exit
        # (and prints DT's message) so a rejected upload fails the job instead of going green.
        run: |
          resp=$(curl --fail-with-body -sS -L -X POST "${DTRACK_URL}" \
            -H "X-API-Key: ${DTRACK_API_KEY}" \
            -F "autoCreate=true" \
            -F "projectName=datatactics/rahla" \
            -F "projectVersion=${{ steps.set-filename.outputs.version }}" \
            -F "parentUUID=${PARENTUUID}" \
            -F "bom=@${{ steps.set-filename.outputs.filename }}")
          echo "Dependency Track response: ${resp}"
          token=$(echo "${resp}" | jq -r '.token // empty')
          if [ -z "${token}" ]; then
            echo "::error::Dependency Track did not return a processing token — upload rejected."
            exit 1
          fi
          echo "Dependency Track processing token: ${token}"
