name: Java Build & Release

on: push

jobs:
  build:
    runs-on: docker

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        run: |
          apt update -qq && apt install -qq -y maven
          mvn --batch-mode --update-snapshots clean package 

      - name: Set up docker
        run: |
          apt update -qq
          apt install -qq -y docker.io

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/datatactics/rahla
            #dttctcs/rahla problem with dockerhub
          tags: |
            type=raw,latest
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,prefix=
                
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Dockerhub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v1
        with:          
          username: ${{ vars.CONTAINER_USERNAME }}
          password: ${{ vars.CONTAINER_PASSWORD }}          
      
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
