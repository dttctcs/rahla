name: Java Build & Release

on: push

jobs:
  build:
    runs-on: docker

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        run: |
          apt update -qq && apt install -qq -y maven
          mvn --batch-mode --update-snapshots clean package 

      - name: Set up docker
        run: |
          apt update -qq
          apt install -qq -y docker.io

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/datatactics/rahla
            #dttctcs/rahla problem with dockerhub
          tags: |
            type=raw,latest
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,prefix=
                
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Dockerhub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v1
        with:          
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ vars.DOCKERHUB_PASS }}          
      
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  trivy-scan:
    name: Trivy SBOM -> Dependency Track
    runs-on: docker
    needs: build
    # only on a release tag (release:prepare runs locally and pushes a vX.Y.Z tag)
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Set version & filename
        id: set-filename
        run: |
          VERSION="${FORGEJO_REF_NAME#v}"          # v1.3.2 -> 1.3.2 (matches the docker semver tag)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "filename=sbom_rahla_${VERSION}.json" >> $GITHUB_OUTPUT

      - name: Install Trivy + jq
        run: |
          apt-get update -qq
          apt-get install -qq -y curl jq
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/v0.58.1/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Trivy SBOM (CycloneDX) of the released image
        env:
          TRIVY_FORMAT: "cyclonedx"
          TRIVY_OUTPUT: "${{ steps.set-filename.outputs.filename }}"
          TRIVY_SCANNERS: "vuln"
          TRIVY_SEVERITY: "MEDIUM,HIGH,CRITICAL"
          TRIVY_USERNAME: ${{ vars.DOCKERHUB_USER }}
          TRIVY_PASSWORD: ${{ vars.DOCKERHUB_PASS }}
        run: trivy image docker.io/datatactics/rahla:${{ steps.set-filename.outputs.version }}

      - name: Fix License Format for Dependency-Track
        env:
          SBOM_FILE: "${{ steps.set-filename.outputs.filename }}"
          SBOM_FILE_TEMP: "${{ steps.set-filename.outputs.filename }}.temp"
        run: |
          jq '
            def fix_licenses:
              if .licenses then
                if (.licenses | length) > 1 then
                  {expression: (.licenses | map(
                    if .license.id then .license.id
                    elif .license.name then .license.name
                    else "Unknown"
                    end
                  ) | join(" OR "))}
                elif (.licenses | length) == 1 then
                  if .licenses[0].license.id then
                    {license: {name: .licenses[0].license.id}}
                  elif .licenses[0].license.name then
                    {license: {name: .licenses[0].license.name}}
                  else
                    .licenses[0]
                  end
                else
                  .
                end
              else
                .
              end;
            if .components then
              .components |= map(
                if .licenses then . + {licenses: [fix_licenses]} else . end
              )
            else . end |
            if .metadata.component.licenses then
              .metadata.component += {licenses: [(.metadata.component | fix_licenses)]}
            else . end
          ' "${SBOM_FILE}" > "${SBOM_FILE_TEMP}"

          [ -s "${SBOM_FILE_TEMP}" ] || { echo "license conversion produced empty file"; exit 1; }
          jq -e . "${SBOM_FILE_TEMP}" > /dev/null || { echo "invalid JSON after conversion"; exit 1; }
          echo "components: $(jq '.components | length' ${SBOM_FILE_TEMP})  vulns: $(jq '.vulnerabilities | length // 0' ${SBOM_FILE_TEMP})"
          mv "${SBOM_FILE_TEMP}" "${SBOM_FILE}"

      - name: Upload SBOM to Dependency Track
        env:
          DTRACK_URL: ${{ vars.DTRACK_URL }}
          PARENTUUID: ${{ vars.DTRACK_PARENTUUID }}
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
        run: |
          curl -L -X POST ${DTRACK_URL} \
            -H 'Content-Type: multipart/form-data' \
            -H "X-API-Key: ${DTRACK_API_KEY}" \
            -F "autoCreate=true" \
            -F "projectName=rahla" \
            -F "projectVersion=${{ steps.set-filename.outputs.version }}" \
            -F "parentUUID=${PARENTUUID}" \
            -F "bom=@${{ steps.set-filename.outputs.filename }}"
