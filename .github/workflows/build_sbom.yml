name: Java CI

on: push

jobs:
  build:
    runs-on: docker
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.compose-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: |
          apt update -qq && apt install -qq -y maven
          mvn --batch-mode --update-snapshots clean package

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: |
            repo.datatactics.dev/datatactics/rahla
          tags: |
            type=raw,latest
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Compose combined tag
        id: compose-tag
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          echo "Raw tags: $TAGS"
          VERSION=$(echo "$TAGS" | tr ',' '\n' | grep -E ':[0-9]+\.[0-9]+\.[0-9]+' | head -n1 | cut -d':' -f2)
          SHA=$(echo "$TAGS" | tr ',' '\n' | grep -E ':[a-f0-9]{6,}' | head -n1 | cut -d':' -f2)
          if [ -z "$SHA" ]; then
            SHA=${GITHUB_SHA::7}
          fi
          if [ -z "$VERSION" ]; then
            VERSION="latest"
          fi
          COMBINED="${VERSION}-${SHA}"
          echo "tag=$COMBINED" >> $GITHUB_OUTPUT

      - name: Set up docker
        run: |
          apt update -qq
          apt install -qq -y docker.io

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Dockerhub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v1
        with:
          registry: repo.datatactics.dev
          #username: ${{ secrets.CONTAINER_USERNAME }}
          #password: ${{ secrets.CONTAINER_PASSWORD }}
          username: releaser
          password: ${{ vars.RELEASE_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v2
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      #- name: Workspace Notification
      #  uses: DTherHtun/google-chat-action@v0.9
      #  if: always()
      #  with:
      #    project: ${{ github.repository }}
      #    commit: "${{ github.event.head_commit.message }}"
      #    branch: ${{ github.ref }}
      #    status: ${{ job.status }}
      #    actionid: ${{ github.repository }}/runs/${{ github.run_id }}
      #    webhook: "${{ secrets.GOOGLE_NOTIFICATION_WEBHOOK }}"

  vulnerability-scan:
    needs: build
    runs-on: ubuntu-latest
    env:
      DTRACK_URL: "https://dtrack.datatactics.dev/api/v1/bom"
      REGISTRY: "container.datatactics.services"
      IMAGE: "rahla"
      PARENTUUID: "e9376173-816a-4443-b971-8e9c5243b124"
      FILENAME: sbom_rahla_latest.json
      TAG: ${{ needs.build.outputs.tag }}
    steps:
      #- name: Docker Login to private registry
        #run: echo "${{ secrets.CONTAINER_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.CONTAINER_USERNAME }}" --password-stdin

      - name: Scan image in a private registry
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.TAG }}
          scan-type: image
          format: cyclonedx
          output: ${{ env.FILENAME }}
          severity: MEDIUM,HIGH,CRITICAL
          scanners: vuln
        env:
          TRIVY_USERNAME: releaser
          TRIVY_PASSWORD: ${{ vars.RELEASE_TOKEN }}

      - name: Upload SBOM to Dependency Track
        run: |
          curl -L -X POST ${DTRACK_URL} \
            -H 'Content-Type: multipart/form-data' \
            #-H "X-API-Key:${{ secrets.DTRACK_API_TOKEN }}" \
            -F "autoCreate=true" \
            -F "projectName=${IMAGE}" \
            -F "projectVersion=${TAG}" \
            -F "parentUUID=${PARENTUUID}" \
            -F "bom=@${FILENAME}"
